
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
    
    <!-- PWA Settings for Android -->
    <meta name="theme-color" content="#FF6600" />
    <link rel="manifest" href="./manifest.json" />

    <!-- PWA Settings for iOS (Critical for Native Feel) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Al-Tayyar Delivery" />
    
    <!-- iOS Icon -->
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />
    <link rel="apple-touch-icon" sizes="152x152" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />
    <link rel="apple-touch-icon" sizes="167x167" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />

    <!-- Browser Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />
    <link rel="shortcut icon" href="https://lh3.googleusercontent.com/d/1xWGm1mzXPy9y33jFux2Lqz3lJhVRgXUx" />
    
    <title>Al-Tayyar Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    
    <!-- LEAFLET MAPS (OpenStreetMap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <script>
      tailwind.config = {
          darkMode: "class",
          theme: {
              extend: {
                  colors: {
                      primary: "#FF6600", // The deep Orange from the flyer background
                      secondary: "#29ABE2", // The Cyan/Blue from the sky/text
                      accent: "#FFCC00", // The Yellow/Gold from "Al-Tayyar" text
                      "brand-red": "#ED1C24", // Flag red
                      "background-light": "#FFFBF5", 
                      "background-dark": "#111111", 
                      "surface-light": "#FFFFFF",
                      "surface-dark": "#1E1E1E",
                  },
                  fontFamily: {
                      display: ["Cairo", "sans-serif"],
                      body: ["Cairo", "sans-serif"],
                  },
                  borderRadius: {
                      DEFAULT: "1rem",
                      'xl': '1.5rem',
                      '2xl': '2rem',
                      '3xl': '2.5rem',
                  },
                  boxShadow: {
                      'bold': '0 4px 0 0 rgba(0,0,0,0.1)',
                      'bold-hover': '0 6px 0 0 rgba(0,0,0,0.1)',
                      'floating': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                      'text-outline': '2px 2px 0px #000000', // To simulate the stroke on the logo text
                  },
                  spacing: {
                      'safe': 'env(safe-area-inset-bottom)',
                      'safe-top': 'env(safe-area-inset-top)',
                  },
                  perspective: {
                      'nav': '1000px',
                  }
              },
          },
      };
    </script>
    <style>
      .map-perspective {
          perspective: 1500px;
          perspective-origin: center 80%;
      }
      .map-tilt {
          transform: rotateX(45deg) translateZ(0);
          transform-origin: center 85%;
          transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Hide zoom buttons and other standard leaflet UI in nav mode more aggressively if needed */
      .nav-mode .leaflet-control-zoom {
          display: none !important;
      }
      /* Improve marker visibility at tilt */
      .map-tilt .leaflet-marker-icon {
          transform-style: preserve-3d;
      }
      
      html, body {
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      body {
        font-family: 'Cairo', sans-serif;
        -webkit-tap-highlight-color: transparent;
        user-select: none; /* Feel like app, not text */
        min-height: 100vh;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #FF6600;
        border-radius: 10px;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none !important;
      }
      .no-scrollbar {
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
        -webkit-overflow-scrolling: touch;
      }
      
      .chunk-shadow {
          box-shadow: 0 4px 0 0 rgba(0,0,0,0.15);
      }
      .chunk-shadow-lg {
          box-shadow: 0 6px 0 0 rgba(0,0,0,0.15);
      }
      .chunk-shadow:active {
          box-shadow: 0 2px 0 0 rgba(0,0,0,0.15);
          transform: translateY(2px);
      }
      
      .text-stroke {
          -webkit-text-stroke: 1px black; 
          text-stroke: 1px black;
      }
      .text-stroke-white {
          -webkit-text-stroke: 2px white;
          text-stroke: 2px white;
      }
      
      /* Ensure proper spacing for notches - Increased to 3rem minimum */
      .pt-safe-top {
          padding-top: max(3rem, env(safe-area-inset-top));
      }
      .pb-safe-bottom {
          padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      }

      /* Map Aesthetics - High End GPS Feel */
      .leaflet-container {
          background: #f8f9fa !important;
          font-family: 'Cairo', sans-serif !important;
      }
      .dark .leaflet-container {
          background: #111111 !important;
      }
      /* Clean and refined map tiles */
      .map-tiles {
          /* Removed grayscale and brightness filters to let the base map show roads clearly */
          transition: filter 0.5s ease;
      }
      .dark .map-tiles:not(.no-invert) {
          filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(110%) grayscale(0.2) saturate(1.2);
      }
      
      /* Beautiful custom marker glow */
      .marker-glow {
          box-shadow: 0 0 15px 5px rgba(255, 102, 0, 0.4);
      }
      .driver-marker-glow {
          box-shadow: 0 0 20px 8px rgba(41, 171, 226, 0.5);
      }

      /* Disable form zooming on iOS */
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
</head>
  <body class="bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 antialiased pb-safe overflow-x-hidden selection:bg-primary selection:text-white">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
